name: Deploy
on:
  workflow_call:
    inputs:
        ENVIRONMENT:
          required: true
          type: string
        TAG:
          required: true
          type: string
        PLAN_ARTIFACT_NAME:
          required: true
          type: string
          

defaults:
  run:
    working-directory: infra/terraform

jobs:
  deploy: 
    name: Deploy ${{ vars.APP_NAME }} to ${{ inputs.ENVIRONMENT }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.ENVIRONMENT }}
    steps:
       - name: Setup Terraform
         uses: hashicorp/setup-terraform@v3

       - name: Terraform Init
         run: terraform init -input=false

       - name: Download Plan Artifact
         uses: actions/download-artifact@v4
         with:
          name: tfplan-${{ inputs.ENVIRONMENT }}
          path: ./tfplan

       - name: Terraform Apply
         run: terraform apply -auto-approve -var-file="./environments/${{ inputs.ENVIRONMENT }}.tfvars" -var="image_tag=${{ inputs.TAG }}"
