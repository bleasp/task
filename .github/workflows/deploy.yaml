name: Deploy
on:
  workflow_call:
    inputs:
        ENVIRONMENT:
            required: true
            type: string
        TAG:
            required: true
            type: string

jobs:
  deploy: 
    name: Deploy ${{ vars.APP_NAME }} to ${{ inputs.ENVIRONMENT }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.ENVIRONMENT }}
    steps:
        - name: Azure Login
          uses: azure/login@v2
          with:
            creds: ${{ secrets.AZURE_CRENDENTIALS }}
        
        - name: Deploy
          uses: azure/container-apps-deploy-action@v1
          with:
            resourceGroup: rg-${{ vars.APP_NAME }}-${{ inputs.ENVIRONMENT }}
            imageToDeploy: ${{ vars.REGISTRY }}/${{ github.repository }}:${{ inputs.TAG }}
            containerAppName: ca-${{ vars.APP_NAME }}-${{ inputs.ENVIRONMENT }}
            containerAppEnvironment: cae-${{ vars.APP_NAME }}-${{ inputs.ENVIRONMENT }}
    